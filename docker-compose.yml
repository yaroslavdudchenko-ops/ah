services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-protocols}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-protocols}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-protocols}
      AI_GATEWAY_URL: ${AI_GATEWAY_URL}
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY}
      AI_GATEWAY_MODEL: ${AI_GATEWAY_MODEL:-InHouse/Qwen3.5-122B}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost","http://localhost:80","https://localhost"]'}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_ENV: ${APP_ENV:-development}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      EMPLOYEE_USERNAME: ${EMPLOYEE_USERNAME:-employee}
      EMPLOYEE_PASSWORD: ${EMPLOYEE_PASSWORD:-emp123}
      AUDITOR_USERNAME: ${AUDITOR_USERNAME:-auditor}
      AUDITOR_PASSWORD: ${AUDITOR_PASSWORD:-aud123}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey32byteslong1234567}
    ports:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.synthia-frontend.rule=Host(`${APP_DOMAIN:-localhost}`)"
      - "traefik.http.routers.synthia-frontend.entrypoints=web"
      - "traefik.http.services.synthia-frontend.loadbalancer.server.port=80"

volumes:
  db-data:
